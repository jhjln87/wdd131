<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Card</title>
    <meta name="description" content="A dynamic character card displaying stats and interactive features for the WDD 131 project.">
    <meta name="author" content="Your Name">

    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Put Page Title Here">
    <meta property="og:description" content="Put Page Description Here">
    <meta property="og:url" content="https://yourURLofPage.here">
    <meta property="og:image" content="https://yourURLofSocialPreviewImageHere.png">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Put Page Title Here">
    <meta name="twitter:description" content="Put Page Description Here">
    <meta name="twitter:image" content="https://yourURLofSocialPreviewImageHere.png">

    <!-- One favicon (ICO works everywhere) -->
    <link rel="icon" href="/favicon.ico">

    <!-- One Apple Touch Icon (iOS home screen) -->
    <link rel="apple-touch-icon" href="/images/apple-touch-icon.png">

    <link rel="stylesheet" href="charactercard.css">
    <script src="charactercard.js" defer></script>
</head>
<body>
    <main>
        <article class="card">
            <img class="image" src="snortleblat.webp" alt="Swamp Beast Diplomat" width="400" height="400" loading="lazy">
            
            <h1 id="char-name" class="name">Snortleblat</h1>
            
            <div class="stats">
                <p><strong>Class:</strong> <span id="char-class"></span></p>
                <p><strong>Level:</strong> <span id="char-level"></span></p>
                <p><strong>Health:</strong> <span id="char-health"></span></p>
            </div>
            
            <div class="buttons">
                <button id="attack-btn">Attacked</button>
                <button id="level-btn">Level Up</button>
            </div>
        </article>
    </main>
</body>
</html>
