<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sort people by age, height, and name, with visuals">
    <meta name="author" content="John Wendt">
    <meta property="og:type" content="website">
    <meta property="og:title" content="SortGroup">
    <meta property="og:description" content="Sort people by age, height, and name, with visuals">
    <meta property="og:url" content="https://jhjln87.github.io/wdd131/prove/final/listSorter">
    <meta property="og:image" content="https://jhjln87.github.io/wdd131/prove/final/listSorter/images/openGraph.webp">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="SortGroup">
    <meta name="twitter:description" content="Sort people by age, height, and name, with visuals">
    <meta name="twitter:image" content="https://jhjln87.github.io/wdd131/prove/final/listSorter/images/twitter.webp">
    <link rel="icon" type="image/x-icon" sizes="32x32" href="images/favicon32.ico">
    <link rel="apple-touch-icon" href="images/shareIcon.webp">
    <link rel="stylesheet" href="style.css">
    <script src="main.js" defer></script>
    <title>SortGroup</title>
</head>
<body>
    <header>
        <img src="images/splashTransparent.png" alt="Sort Group App Logo">
        <div id="actionContainer">
            <button type="button" id="addButton" aria-expanded="false" aria-controls="newPersonForm">Add Person</button>
            <button type="button" id="sortButton" aria-expanded="false" aria-controls="sortByForm">Sort List By</button>
        </div>
        <form id="newPersonForm" aria-label="Add a new person form">
            <div class="formGroup">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="John" required>
            </div>
            <div class="formGroup">
                <label for="age">Age</label>
                <input type="number" id="age" name="age" placeholder="23" required min="0">
            </div>
            <div class="formGroup">
                <label for="height">Height (inches)</label>
                <input type="number" id="height" name="height" placeholder="70" required min="0">
            </div>
            <fieldset class="formGroup">
                <legend>Gender</legend>
                <div id="genderContainer">
                    <div class="radioOption">
                        <input type="radio" id="male" name="gender" value="M" required>
                        <label for="male">Male</label>
                    </div>
                    <div class="radioOption">
                        <input type="radio" id="female" name="gender" value="F" required>
                        <label for="female">Female</label>
                    </div>
                </div>
            </fieldset>
            <button type="submit" id="submitPerson">Add to list</button>
        </form>
        <form id="sortByForm" aria-label="Sort person list options">
            <fieldset id="sortRadioContainer" class="formGroup">
                <legend class="sr-only">Choose attribute to sort by</legend>
                <div class="radioOption">
                    <input type="radio" id="sortName" name="sortBy" value="name">
                    <label for="sortName">Name (Alphabetic)</label>
                </div>
                <div class="radioOption">
                    <input type="radio" id="sortAge" name="sortBy" value="age">
                    <label for="sortAge">Age</label>
                </div>
                <div class="radioOption">
                    <input type="radio" id="sortHeight" name="sortBy" value="height_in" checked>
                    <label for="sortHeight">Height</label>
                </div>
            </fieldset>
            <button type="submit" id="sortList">Sort list</button>
        </form>
    </header>
    <main aria-label="People Chart Display" aria-live="polite">
    </main>
    <footer>
        <p>Website logo, favicon, splash image, etc. generated by <a href="https://gemini.google.com/" target="_blank" rel="noopener">Google Gemini</a></p>
        <a href="https://github.com/jhjln87" target="_blank" rel="noopener" aria-label="Visit my GitHub Profile"><img src="images/github.webp" alt=""></a>
        <a href="https://jhjln87.github.io/portfolio" id="up" target="_blank" rel="noopener">Link to my Portfolio</a>
        <a href="https://www.linkedin.com/in/johnwendt04/" target="_blank" rel="noopener" aria-label="Visit my LinkedIn Profile"><img src="images/linkedin.webp" alt=""></a>
    </footer>
</body>
</html>
