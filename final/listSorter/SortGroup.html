<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="js.js" defer></script>
    <title>SortGroup</title>
</head>
<body>
    <header>
        <img src="" alt="Splash logo for Sort Group App">
        <div id="actionContainer">
            <button type="button">Add Person</button>
            <button type="button">Sort List By</button>
        </div>
        <div id="add">
            <form id="newPersonForm">
                <div class="formGroup">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" placeholder="John" required>
                </div>
                <div class="formGroup">
                    <label for="age">Age</label>
                    <input type="number" id="age" name="age" placeholder="23" required>
                </div>
                <div class="formGroup">
                    <label for="height">Height (inches)</label>
                    <input type="number" id="height" name="height" placeholder="70" required>
                </div>
                <fieldset class="formGroup">
                    <legend>Gender</legend>
                    <div class="genderContainer">
                        <div class="radioOption">
                            <input type="radio" id="male" name="gender" value="M" required>
                            <label for="male">Male</label>
                        </div>
                        <div class="radioOption">
                            <input type="radio" id="female" name="gender" value="F" required>
                            <label for="female">Female</label>
                        </div>
                    </div>
                </fieldset>
                <button type="submit" id="submitPerson">Add to list</button>
            </form>
        </div>
    </header>
    <main>
    </main>
</body>
</html>
